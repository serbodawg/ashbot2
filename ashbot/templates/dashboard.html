<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AshBot 2 Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a1a;
    color: #e0e0ff;
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #0a1628, #1a1a3e);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    gap: 20px;
    border-bottom: 1px solid #2a2a5e;
  }
  .header h1 { font-size: 24px; background: linear-gradient(90deg, #4fc3f7, #7c4dff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .stats { display: flex; gap: 24px; padding: 24px 40px; }
  .stat-card {
    background: linear-gradient(135deg, #12122a, #1a1a3e);
    border: 1px solid #2a2a5e;
    border-radius: 12px;
    padding: 20px 32px;
    text-align: center;
    flex: 1;
  }
  .stat-card .number { font-size: 36px; font-weight: 700; color: #4fc3f7; }
  .stat-card .label { font-size: 14px; color: #8888aa; margin-top: 4px; }
  .section { padding: 0 40px; }
  .section h2 { font-size: 18px; margin-bottom: 16px; color: #aaaacc; }
  .guild-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .guild-card {
    background: linear-gradient(135deg, #12122a, #1a1a3e);
    border: 1px solid #2a2a5e;
    border-radius: 12px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: border-color 0.2s;
  }
  .guild-card:hover { border-color: #4fc3f7; }
  .guild-icon {
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, #4fc3f7, #7c4dff);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700; color: white;
    flex-shrink: 0;
  }
  .guild-info { flex: 1; }
  .guild-info .name { font-weight: 600; font-size: 15px; }
  .guild-info .members { font-size: 13px; color: #8888aa; }
  .footer { text-align: center; padding: 32px; color: #555577; font-size: 13px; }
</style>
</head>
<body>
<div class="header">
  <div style="width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#4fc3f7,#7c4dff);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:white;">A</div>
  <h1>AshBot 2 Dashboard</h1>
</div>

<div class="stats">
  <div class="stat-card">
    <div class="number">{{ guild_count }}</div>
    <div class="label">Servers</div>
  </div>
  <div class="stat-card">
    <div class="number">{{ guilds|sum(attribute='members') }}</div>
    <div class="label">Users</div>
  </div>
</div>

<div class="section">
  <h2>Connected Servers</h2>
  <div class="guild-grid">
    {% for g in guilds %}
    <a href="/server/{{ g.id }}?secret={{ request.query_params.secret }}" style="text-decoration:none;color:inherit;">
      <div class="guild-card" style="cursor:pointer;">
        <div class="guild-icon">
          {% if g.icon %}<img src="{{ g.icon }}" style="width:48px;height:48px;border-radius:50%">{% else %}{{ g.name[:1] }}{% endif %}
        </div>
        <div class="guild-info">
          <div class="name">{{ g.name }}</div>
          <div class="members">{{ g.members }} members</div>
        </div>
      </div>
    </a>
    {% endfor %}
  </div>
</div>

<div class="footer">AshBot 2 — Futuristic Discord Protection Bot</div>
</body>
</html>
